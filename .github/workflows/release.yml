name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - none

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          if [ "${{ inputs.bump }}" != "none" ]; then
            npm version ${{ inputs.bump }} --no-git-tag-version
            node -e "
              const fs = require('fs');
              const m = JSON.parse(fs.readFileSync('src/manifest.json', 'utf8'));
              m.version = process.env.VERSION;
              fs.writeFileSync('src/manifest.json', JSON.stringify(m, null, 2) + '\n');
            " VERSION=$(node -p "require('./package.json').version")
          fi
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            git push origin ":refs/tags/$TAG"
          fi
          if [ "${{ inputs.bump }}" != "none" ]; then
            git add package.json src/manifest.json
            git commit -m "chore: bump version to $TAG"
          fi
          git tag "$TAG"
          git push && git push --tags

      - run: npm install
      - run: npm run zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          files: "*.zip"
